server:
  port: ${PORT:4004}

spring:
  application:
    name: java-enterprise
  data:
    mongodb:
      uri: ${FORGE_DATABASE_URL:mongodb://localhost:27017/forgeai}
      database: ${FORGE_DATABASE_NAME:forgeai}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

enterprise:
  integration-mode: ${ENTERPRISE_INTEGRATION_MODE:stub}
  compliance-provider: ${ENTERPRISE_COMPLIANCE_PROVIDER:default}
  audit-topic: ${ENTERPRISE_AUDIT_TOPIC:forge.enterprise.audit}
